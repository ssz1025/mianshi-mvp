# golangci-lint 配置文件
# 文档: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  # 超时时间
  timeout: 5m
  # 要检查的 Go 版本
  go: '1.21'

# 输出配置
output:
  formats:
    colored-line-number: {}
  print-issued-lines: true
  print-linter-name: true

# 格式化器配置 (v2 新增)
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/d60-Lab/gin-template

# 启用的 linters
linters:
  enable:
    # 默认启用
    - errcheck      # 检查未处理的错误
    - govet         # Go vet 检查
    - ineffassign   # 检查无效赋值
    - staticcheck   # 静态检查 (v2 中包含 gosimple, stylecheck)
    - unused        # 检查未使用的常量、变量、函数等

    # 代码质量
    - gocyclo       # 检查函数复杂度
    - revive        # 替代 golint
    - misspell      # 检查拼写错误
    - goconst       # 检查可以提取为常量的字符串
    - dupl          # 检查重复代码
    - gosec         # 安全检查

    # 性能
    - prealloc      # 检查切片预分配

    # 风格
    - whitespace    # 空格检查

    # Bug 检测
    - bodyclose     # 检查 HTTP response body 是否关闭
    - noctx         # 检查是否传递 context
    - rowserrcheck  # 检查 sql.Rows.Err 是否被检查
    - sqlclosecheck # 检查 sql.Rows 和 sql.Stmt 是否关闭

    # 复杂度
    - funlen        # 函数长度检查
    - gocognit      # 认知复杂度检查

# Linters 设置
linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  gocyclo:
    min-complexity: 15

  revive:
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  goconst:
    min-len: 3
    min-occurrences: 3

  dupl:
    threshold: 100

  gosec:
    excludes:
      - G404  # 使用弱随机数生成器（在非加密场景可接受）

  funlen:
    lines: 100
    statements: 50

  gocognit:
    min-complexity: 20

# Issues 配置
issues:
  exclude-dirs:
    - vendor
    - bin
    - docs
    - migrations

  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"

  exclude-rules:
    # 排除测试文件的某些检查
    - path: _test\.go
      linters:
        - funlen
        - gocyclo
        - dupl
        - gosec

    # 排除生成的文件
    - path: \.pb\.go
      linters:
        - all

    # 排除 main.go 的某些检查
    - path: cmd/server/main\.go
      linters:
        - funlen

  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
